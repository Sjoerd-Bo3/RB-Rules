name: v2 deploy to VM

# Deployt de v2-stack naar de Server-setup VM. Twee modi:
#  - update (default): compose syncen + pull + up — draait na elke publish.
#  - bootstrap (workflow_dispatch met bootstrap=true): EERSTE deploy —
#    schrijft .env uit secrets, ontdekt het Caddy-netwerk, start de stack,
#    pullt bge-m3, voegt de Caddy-route toe en trapt de kaart-sync af.
#
# Image-pinning (issue #45, :latest-race): twee parallelle publishes kunnen
# :latest in de verkeerde volgorde zetten (PR #83 miste daardoor tijdelijk op
# productie). Daarom pint deze workflow bij een workflow_run-trigger de
# :<commit-SHA>-tag van precies de publish die hem triggerde
# (workflow_run.head_sha; v2-ci.yml pusht die tag naast :latest). Route: één
# IMAGE_TAG-env, geëxporteerd op het SSH-commando — bewust NIET in de VM-.env
# geschreven, zodat die stateless blijft en handmatig `docker compose up -d`
# op de VM gewoon op :latest (compose-default) blijft draaien.
# Bij workflow_dispatch: input image_tag (default latest) — 'latest' voor de
# oude flow, of een commit-SHA om een specifieke build te (her)deployen.
#
# Job-gate (issue #45, derde praktijkvondst): de check op het merge-moment
# dekt het gat tot de daadwerkelijke deploy niet — een admin-job die tijdens
# de publish-doorlooptijd start werd alsnog afgebroken door de herstart.
# Daarom pollt de stap "Wacht op lopende admin-job" hier, vlak vóór
# 'compose up', de admin-status op de VM en wacht zolang er een job draait.
#
# Vereiste secrets:
#   DEPLOY_SSH_KEY   — private key voor sjoerd@20.123.137.64 (altijd)
#   POSTGRES_PASSWORD, NEO4J_PASSWORD, ADMIN_PASSWORD,
#   CLAUDE_CODE_OAUTH_TOKEN — voor bootstrap
# Zonder DEPLOY_SSH_KEY wordt de job netjes overgeslagen.
# DNS (riftbound-v2.bo3.dev → VM-IP) blijft handmatig bij de registrar.
on:
  workflow_run:
    workflows: ["v2 CI & publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Eerste deploy: .env + Caddy-route + model + kickoff"
        type: boolean
        default: false
      image_tag:
        description: "Image-tag om te deployen (latest of een commit-SHA die v2-ci gepubliceerd heeft)"
        type: string
        default: "latest"

# Serialiseer deploys: vijf snelle merges gaven vijf racende runs met
# containernaam-conflicten op de VM (issue #45). Nieuwe runs wachten netjes
# op elkaar; cancel-in-progress: false zodat elke publish alsnog uitrolt.
concurrency:
  group: v2-deploy
  cancel-in-progress: false

env:
  VM_HOST: 20.123.137.64
  VM_USER: sjoerd
  VM_PATH: /home/sjoerd/compose/rb-rules-v2
  DOMAIN: riftbound-v2.bo3.dev
  # workflow_run → pin de commit-SHA van de triggerende publish;
  # workflow_dispatch → de image_tag-input (default latest).
  IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.image_tag || 'latest' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Valideer image-tag
        run: |
          # De tag belandt in een SSH-commando; alleen geldige Docker-tagtekens
          # toestaan (vangt ook een typefout in de dispatch-input vroeg af).
          if ! printf '%s' "$IMAGE_TAG" | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$'; then
            echo "::error::ongeldige image-tag '$IMAGE_TAG'"
            exit 1
          fi
          echo "Deploy pint image-tag: $IMAGE_TAG (trigger: ${{ github.event_name }})"

      - name: Check secret
        id: check
        run: |
          if [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_SSH_KEY ontbreekt — deploy overgeslagen (voeg het secret toe om push-to-deploy te activeren)"
          fi

      - name: Set up SSH
        if: steps.check.outputs.enabled == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHCMD=ssh -i ~/.ssh/id_deploy $VM_USER@$VM_HOST" >> "$GITHUB_ENV"

      - name: "Bootstrap: schrijf .env uit secrets"
        if: steps.check.outputs.enabled == 'true' && inputs.bootstrap == true
        run: |
          umask 077
          # Secrets-hygiëne (issue #45): geen hardcoded NEO4J_PASSWORD meer en
          # CLAUDE_CODE_OAUTH_TOKEN wordt óók gevalideerd — een bootstrap
          # zonder AI-token levert anders een stilletjes kreupele stack op.
          for s in POSTGRES_PASSWORD NEO4J_PASSWORD ADMIN_PASSWORD CLAUDE_CODE_OAUTH_TOKEN; do
            if [ -z "${!s:-}" ]; then echo "::error::secret $s ontbreekt (nodig voor bootstrap)"; exit 1; fi
          done
          # Caddy-netwerknaam op de VM ontdekken (niet raden)
          CADDY_NETWORK=$($SSHCMD "docker inspect caddy -f '{{range \$k, \$v := .NetworkSettings.Networks}}{{\$k}} {{end}}'" | awk '{print $1}')
          if [ -z "$CADDY_NETWORK" ]; then echo "::error::Caddy-netwerk niet gevonden op de VM"; exit 1; fi
          echo "Caddy-netwerk: $CADDY_NETWORK"

          cat > env.tmp <<EOF
          CADDY_NETWORK=$CADDY_NETWORK
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          NEO4J_PASSWORD=$NEO4J_PASSWORD
          NEO4J_HEAP_MAX=512m
          NEO4J_PAGECACHE=384m
          ADMIN_PASSWORD=$ADMIN_PASSWORD
          CLAUDE_CODE_OAUTH_TOKEN=$CLAUDE_CODE_OAUTH_TOKEN
          ANTHROPIC_API_KEY=
          EOF
          $SSHCMD "mkdir -p '$VM_PATH'"
          scp -i ~/.ssh/id_deploy env.tmp "$VM_USER@$VM_HOST:$VM_PATH/.env.bootstrap"
          # Vervang de bootstrapwaarden atomair, maar behoud rb-ai-keys die al
          # op de VM staan. Rotatie zonder kluismigratie zou de kluis breken.
          $SSHCMD "sh -s -- '$VM_PATH'" <<'REMOTE'
          set -eu
          vm_path="$1"
          env_file="$vm_path/.env"
          bootstrap_file="$vm_path/.env.bootstrap"
          next_file="$vm_path/.env.next"
          umask 077
          cp "$bootstrap_file" "$next_file"
          for name in RB_AI_CONTROL_KEY RB_AI_VAULT_KEY; do
            value=""
            if [ -f "$env_file" ]; then
              value="$(sed -n "s/^${name}=//p" "$env_file" | tail -n 1)"
            fi
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$name" "$value" >> "$next_file"
            fi
          done
          mv "$next_file" "$env_file"
          rm -f "$bootstrap_file"
          chmod 600 "$env_file"
          REMOTE
          rm env.tmp
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Zorg voor rb-ai control- en vault-keys
        if: steps.check.outputs.enabled == 'true'
        run: |
          # Bestaande VM's hebben deze waarden nog niet. Genereer ze OP de VM,
          # toon ze nooit in Actions-output en bewaar de .env met mode 600.
          # De vault-key is exact 32 bytes in base64 (AES-256-GCM).
          $SSHCMD "sh -s -- '$VM_PATH'" <<'REMOTE'
          set -eu
          vm_path="$1"
          env_file="$vm_path/.env"
          vault_file="/mnt/data/rb-ai/rb-rules-v2/config/ai-config.v1.enc"
          key_check="$vm_path/.rb-ai-vault-key.check"
          umask 077
          mkdir -p "$vm_path" /mnt/data/rb-ai/rb-rules-v2/config
          touch "$env_file"
          control_key="$(sed -n 's/^RB_AI_CONTROL_KEY=//p' "$env_file" | tail -n 1)"
          if ! printf '%s' "$control_key" | grep -Eq '^[a-fA-F0-9]{64}$'; then
            value="$(openssl rand -hex 32)"
            if grep -q '^RB_AI_CONTROL_KEY=' "$env_file"; then
              sed -i "s|^RB_AI_CONTROL_KEY=.*|RB_AI_CONTROL_KEY=$value|" "$env_file"
            else
              printf 'RB_AI_CONTROL_KEY=%s\n' "$value" >> "$env_file"
            fi
          fi

          vault_key="$(sed -n 's/^RB_AI_VAULT_KEY=//p' "$env_file" | tail -n 1)"
          vault_key_valid=false
          if [ -n "$vault_key" ] \
             && printf '%s' "$vault_key" | base64 -d > "$key_check" 2>/dev/null \
             && [ "$(wc -c < "$key_check" | tr -d ' ')" = "32" ]; then
            vault_key_valid=true
          fi
          rm -f "$key_check"
          if [ "$vault_key_valid" != true ]; then
            if [ -s "$vault_file" ]; then
              echo "ongeldige RB_AI_VAULT_KEY bij bestaande AI-kluis; herstel de originele key" >&2
              exit 1
            fi
            value="$(openssl rand -base64 32)"
            if grep -q '^RB_AI_VAULT_KEY=' "$env_file"; then
              sed -i "s|^RB_AI_VAULT_KEY=.*|RB_AI_VAULT_KEY=$value|" "$env_file"
            else
              printf 'RB_AI_VAULT_KEY=%s\n' "$value" >> "$env_file"
            fi
          fi
          chmod 600 "$env_file"
          chmod 700 /mnt/data/rb-ai/rb-rules-v2/config
          REMOTE

      - name: Sync compose file
        if: steps.check.outputs.enabled == 'true'
        run: |
          $SSHCMD "mkdir -p $VM_PATH"
          scp -i ~/.ssh/id_deploy \
            deploy/server-setup-v2/docker-compose.yml \
            "$VM_USER@$VM_HOST:$VM_PATH/docker-compose.yml"

      - name: Wacht op lopende admin-job
        # Bij bootstrap is er nog geen stack (en geen .env) om te bevragen.
        if: steps.check.outputs.enabled == 'true' && inputs.bootstrap != true
        run: |
          # Issue #45 (derde praktijkvondst): 'compose up' herstart rb-api en
          # breekt een lopende admin-job af. Poll daarom eerst de admin-status
          # (zelfde curl-in-intern-netwerk-patroon als de verify-stap) en
          # wacht — elke 30s, max ~20 min — tot er geen job meer draait.
          # Bewuste keuze: is rb-api onbereikbaar (bv. crash-loop van een
          # vorige deploy) of ontbreekt de .env, dan slaan we de gate over
          # met een notice in plaats van te falen — anders kan een
          # fix-forward-deploy nooit landen en zit productie muurvast.
          ADMIN_KEY=$($SSHCMD "grep '^ADMIN_PASSWORD=' $VM_PATH/.env | cut -d= -f2-" 2>/dev/null || true)
          if [ -z "$ADMIN_KEY" ]; then
            echo "::notice::geen ADMIN_PASSWORD in $VM_PATH/.env gevonden — job-gate overgeslagen (stack nog niet ge-bootstrapt?)"
            exit 0
          fi
          echo "::add-mask::$ADMIN_KEY"

          # /api/admin/status: compacte camelCase-JSON met top-level
          # "running":null (vrij) of "running":{"name":...} (job actief).
          probe() {
            $SSHCMD "docker run --rm --network rb-rules-v2_internal curlimages/curl:latest -fsS -m 10 -H 'X-Admin-Key: $ADMIN_KEY' http://rb-v2-api:8080/api/admin/status" 2>/dev/null
          }

          down=0
          for i in $(seq 1 40); do
            if body=$(probe); then
              down=0
              if printf '%s' "$body" | grep -q '"running":null'; then
                echo "OK: geen admin-job actief — deploy gaat door (poging $i)"
                exit 0
              fi
              job=$(printf '%s' "$body" | sed -n 's/.*"running":{"name":"\([^"]*\)".*/\1/p')
              echo "admin-job '${job:-onbekend}' draait — 30s wachten (poging $i/40)"
              sleep 30
            else
              # -fsS: ook een 401 (key geweigerd) telt als onbereikbaar; drie
              # opeenvolgende missers voordat we overslaan, zodat één hikje de
              # gate niet omzeilt terwijl er wél een job draait.
              down=$((down+1))
              if [ "$down" -ge 3 ]; then
                echo "::notice::rb-api onbereikbaar (of key geweigerd) — job-gate overgeslagen zodat een fix-forward-deploy kan landen"
                exit 0
              fi
              echo "admin-status antwoordt niet (misser $down/3) — 10s wachten"
              sleep 10
            fi
          done
          echo "::error::na ~20 min draait er nog steeds een admin-job — deploy afgebroken om de job niet te onderbreken. Herstart deze run zodra de job klaar is (of deploy via workflow_dispatch)."
          exit 1

      - name: Ruim oude images op vóór de pull (#164)
        if: steps.check.outputs.enabled == 'true'
        run: |
          # SHA-pinning (#86) stapelt per merge drie nieuwe images; zonder
          # opruimen loopt de 61GB root-disk vol (#164: de deploy faalde op
          # 'no space left on device' bij de pull). Vóór de pull ruimen we alle
          # images op die GEEN draaiende container gebruikt — de live versie is
          # daarbij beschermd, dus dit is veilig ook als het net misging — plus
          # de build-cache. Rollback pullt zo nodig opnieuw uit GHCR (de bron).
          # Best-effort: een opruimfout mag de deploy nooit breken.
          $SSHCMD "docker image prune -af || true; docker builder prune -af || true; echo '--- schijf na opruimen:'; df -h / | tail -1"

      - name: Pull & (re)start stack
        if: steps.check.outputs.enabled == 'true'
        run: |
          # Docker maakt de /mnt/data bind-mount-mappen zelf aan (daemon = root).
          # IMAGE_TAG via export op het SSH-commando: shell-env wint van de
          # .env-file bij compose-substitutie, dus pull én up gebruiken exact
          # de gepinde tag zonder dat er iets op de VM achterblijft.
          $SSHCMD "cd $VM_PATH && export IMAGE_TAG='$IMAGE_TAG' && docker compose --project-name rb-rules-v2 pull -q && docker compose --project-name rb-rules-v2 up -d && docker compose --project-name rb-rules-v2 ps"

      - name: Verifieer deploy
        if: steps.check.outputs.enabled == 'true'
        run: |
          # Issue #45: een deploy die niets verifieert is geen deploy. Wacht
          # tot rb-api, rb-web én de bestaande Beheer → Brein-controlketen echt
          # antwoorden (max ~3 min — EF-migraties bij opstart kunnen even duren).
          verify() {
            $SSHCMD "docker run --rm --network rb-rules-v2_internal curlimages/curl:latest -fsS -m 10 -o /dev/null $1"
          }
          verify_ai_config() {
            # Lees ADMIN_PASSWORD uitsluitend op de VM. Deze facade-probe bewijst
            # tegelijk beheerauth → rb-api → control-key → rb-ai → vault-load.
            $SSHCMD "sh -s -- '$VM_PATH'" <<'REMOTE'
          set -eu
          vm_path="$1"
          admin_key="$(sed -n 's/^ADMIN_PASSWORD=//p' "$vm_path/.env" | tail -n 1)"
          [ -n "$admin_key" ]
          docker run --rm --network rb-rules-v2_internal curlimages/curl:latest \
            -fsS -m 10 -o /dev/null -H "X-Admin-Key: $admin_key" \
            http://rb-v2-api:8080/api/admin/ai-config
          REMOTE
          }
          for i in $(seq 1 18); do
            if verify http://rb-v2-api:8080/health \
               && verify http://rb-v2-web:3000/ \
               && verify_ai_config; then
              echo "OK: rb-api, rb-web en AI-beheer antwoorden (poging $i)"
              exit 0
            fi
            echo "nog niet gezond (poging $i/18) — 10s wachten"
            sleep 10
          done
          echo "::error::rb-api, rb-web of AI-beheer antwoordt niet na de deploy"
          $SSHCMD "cd $VM_PATH && docker compose --project-name rb-rules-v2 ps && docker compose --project-name rb-rules-v2 logs --tail 50 rb-api rb-web rb-ai"
          exit 1

      - name: "Bootstrap: embeddings-model, Caddy-route, kickoff"
        if: steps.check.outputs.enabled == 'true' && inputs.bootstrap == true
        run: |
          # 1. Meertalig embeddingmodel (idempotent)
          $SSHCMD "cd $VM_PATH && docker compose --project-name rb-rules-v2 exec -T ollama ollama pull bge-m3"

          # 2. Caddy-route toevoegen als die er nog niet staat + reload.
          #    Security-headers (issue #45); CSP bewust niet — die vergt eerst
          #    testen tegen de SvelteKit-app (inline scripts/PWA) en hoort
          #    niet blind in een bootstrap.
          $SSHCMD "grep -q '$DOMAIN' ~/compose/caddy/Caddyfile || printf '\n%s {\n\tencode gzip\n\theader {\n\t\tStrict-Transport-Security \"max-age=31536000\"\n\t\tX-Content-Type-Options nosniff\n\t\tX-Frame-Options DENY\n\t\tReferrer-Policy strict-origin-when-cross-origin\n\t}\n\treverse_proxy rb-v2-web:3000\n}\n' '$DOMAIN' >> ~/compose/caddy/Caddyfile"
          $SSHCMD "docker exec caddy caddy reload --config /etc/caddy/Caddyfile"

          # 3. Kickoff: kaart-sync (secret komt uit de .env op de VM, niet uit
          #    de commandline van de runner). Daarna doet de scheduler de rest.
          #    De stack is hierboven al geverifieerd gezond.
          $SSHCMD "cd $VM_PATH && . ./.env && docker run --rm --network rb-rules-v2_internal curlimages/curl:latest -fsS -m 300 -X POST -H \"X-Admin-Key: \$ADMIN_PASSWORD\" http://rb-v2-api:8080/api/admin/cards/sync" || echo "::warning::kaart-sync-kickoff faalde — kan later via /admin"
