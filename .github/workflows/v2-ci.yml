name: v2 CI & publish

# Test-gate vóór image-push (audit-fix: geen ongeteste auto-deploys meer).
# PoP-workflow (docker-publish.yml) blijft ongemoeid.
on:
  push:
    branches: [main]
    paths: ["rb-api/**", "rb-web/**", "rb-ai/**", ".github/workflows/v2-ci.yml"]
  pull_request:
    paths: ["rb-api/**", "rb-web/**", "rb-ai/**", ".github/workflows/v2-ci.yml"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: rb-api — build & test
        working-directory: rb-api
        run: dotnet test

      - name: rb-web — check & build
        working-directory: rb-web
        run: |
          npm ci
          npx svelte-kit sync
          npx svelte-check
          npm run build

      - name: rb-ai — typecheck
        working-directory: rb-ai
        run: |
          npm ci
          npm run typecheck

  publish:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [rb-api, rb-web, rb-ai]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/sjoerd-bo3/rb-rules-${{ matrix.service }}:latest
            ghcr.io/sjoerd-bo3/rb-rules-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
