name: Build & publish image (PoP — gearchiveerd)

# PoP-image (Next.js, riftbound.bo3.dev). Vervangen door de v2-stack
# (v2-ci.yml). Alleen nog handmatig te starten; faalde anders rood op
# elke push terwijl v2 gewoon groen was.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/sjoerd-bo3/rb-rules:latest
            ghcr.io/sjoerd-bo3/rb-rules:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
