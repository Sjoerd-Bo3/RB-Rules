# RB-Rules v2 op de Server-setup VM — achter de centrale Caddy, images uit GHCR
# (Watchtower auto-update). Draait NAAST de PoP tot pariteit; wissel dan de
# Caddy-route om.
#
#   docker compose --project-name rb-rules-v2 up -d
services:
  rb-api:
    image: ghcr.io/sjoerd-bo3/rb-rules-rb-api:latest
    container_name: rb-v2-api
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      DATABASE_URL: Host=rb-v2-postgres;Database=rbrules;Username=rbrules;Password=${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://rb-v2-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-rbrules-neo4j}
      RB_AI_URL: http://rb-v2-ai:8090
      OLLAMA_URL: http://rb-v2-ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  rb-web:
    image: ghcr.io/sjoerd-bo3/rb-rules-rb-web:latest
    container_name: rb-v2-web
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      RB_API_URL: http://rb-v2-api:8080
    depends_on: [rb-api]
    networks: [internal, caddy]

  rb-ai:
    image: ghcr.io/sjoerd-bo3/rb-rules-rb-ai:latest
    container_name: rb-v2-ai
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks: [internal]

  postgres:
    image: pgvector/pgvector:pg17
    container_name: rb-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rbrules
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rbrules
    volumes:
      - /mnt/data/postgres/rb-rules-v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbrules"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # Audit-fix: graph is kernonderdeel — altijd aan (geen optioneel profiel).
  neo4j:
    image: neo4j:5-community
    container_name: rb-v2-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-rbrules-neo4j}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-512m}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-384m}
    volumes:
      - /mnt/data/neo4j/rb-rules-v2:/data
    networks: [internal]

  # Meertalig embeddingmodel: docker compose -p rb-rules-v2 exec ollama ollama pull bge-m3
  ollama:
    image: ollama/ollama:latest
    container_name: rb-v2-ollama
    restart: unless-stopped
    volumes:
      - /mnt/data/ollama/rb-rules-v2:/root/.ollama
    networks: [internal]

networks:
  internal:
  caddy:
    external: true
    name: ${CADDY_NETWORK}
