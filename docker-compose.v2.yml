# v2-stack (lokale dev): rb-api (.NET) + rb-web (SvelteKit) + rb-ai (sidecar)
# + postgres/neo4j/ollama. Start: docker compose -f docker-compose.v2.yml up -d --build
services:
  rb-api:
    build: ./rb-api
    environment:
      DATABASE_URL: Host=postgres;Database=rbrules;Username=rbrules;Password=rbrules
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-rbrules-neo4j}
      RB_AI_URL: http://rb-ai:8090
      # Alleen voor de interne beheerproxy; providercredentials komen nooit in rb-api.
      RB_AI_CONTROL_KEY: ${RB_AI_CONTROL_KEY:-local-development-control-key-325}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      OLLAMA_URL: http://ollama:11434
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  rb-web:
    build: ./rb-web
    environment:
      RB_API_URL: http://rb-api:8080
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - rb-api

  rb-ai:
    build: ./rb-ai
    environment:
      # Ongenummerd = compatibele single-accountmodus. Zodra een genummerd
      # slot niet-leeg is, negeert rb-ai de ongenummerde waarden voor die provider.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN_1: ${CLAUDE_CODE_OAUTH_TOKEN_1:-}
      ANTHROPIC_API_KEY_1: ${ANTHROPIC_API_KEY_1:-}
      CLAUDE_CODE_OAUTH_TOKEN_2: ${CLAUDE_CODE_OAUTH_TOKEN_2:-}
      ANTHROPIC_API_KEY_2: ${ANTHROPIC_API_KEY_2:-}
      CODEX_ACCESS_TOKEN: ${CODEX_ACCESS_TOKEN:-}
      CODEX_HOME: ${CODEX_HOME:-}
      CODEX_ACCESS_TOKEN_1: ${CODEX_ACCESS_TOKEN_1:-}
      CODEX_HOME_1: ${CODEX_HOME_1:-}
      CODEX_ACCESS_TOKEN_2: ${CODEX_ACCESS_TOKEN_2:-}
      CODEX_HOME_2: ${CODEX_HOME_2:-}
      RB_AI_CONTROL_KEY: ${RB_AI_CONTROL_KEY:-local-development-control-key-325}
      # Dev-only fallback: 32 nulbytes in base64. Productie heeft een unieke key.
      RB_AI_VAULT_KEY: ${RB_AI_VAULT_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      RB_AI_CONFIG_DIR: /var/lib/rb-ai/config
      # Brein-tools (#106/#107): de agentic-taak praat via de brein-API terug
      # met rb-api (compose-intern).
      RB_API_URL: http://rb-api:8080
    volumes:
      # Alleen gebruikt wanneer CODEX_HOME_1/2 naar deze containerpaden wijst.
      # Elk account heeft een eigen schrijfbare auth/state-directory.
      - codexhome1_v2:/var/lib/rb-ai/codex-1
      - codexhome2_v2:/var/lib/rb-ai/codex-2
      - aiconfig_v2:/var/lib/rb-ai/config
    # geen ports: alleen intern bereikbaar

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: rbrules
      POSTGRES_PASSWORD: rbrules
      POSTGRES_DB: rbrules
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbrules"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Audit-fix: de graph is een kernonderdeel van de engine — altijd aan.
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-rbrules-neo4j}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1g}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4jdata_v2:/data

  # Meertalig embeddingmodel (NL↔EN): docker compose exec ollama ollama pull bge-m3
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollamadata_v2:/root/.ollama

volumes:
  pgdata_v2:
  neo4jdata_v2:
  ollamadata_v2:
  codexhome1_v2:
  codexhome2_v2:
  aiconfig_v2:
