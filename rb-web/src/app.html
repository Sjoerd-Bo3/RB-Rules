<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f7f9" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1114" />
		<title>Poracle</title>
		<link rel="icon" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<!-- Thema vóór de eerste verf zetten (#214): geen licht-flits als de
		     bezoeker donker koos. Alleen een expliciete keuze wint; anders volgt
		     app.css de OS-voorkeur (prefers-color-scheme). -->
		<script>
			try {
				var t = localStorage.getItem('rb-theme');
				if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
