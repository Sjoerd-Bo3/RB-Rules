# Self-host stack — draait identiek op een Mac mini en een Azure-VM.
#
#   Lokaal (Mac mini):   docker compose up -d
#   Publiek (Azure+TLS): docker compose --profile public up -d   (zet DOMAIN in .env)
#
# Geheugeninstellingen via .env (defaults afgestemd op ~8 GB, bv. Azure B2ms).
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: rbrules
      POSTGRES_PASSWORD: rbrules
      POSTGRES_DB: rbrules
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbrules"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-rbrules-neo4j}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT:-1g}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-2g}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-1g}
    ports:
      - "127.0.0.1:7474:7474" # browser UI — alleen lokaal benaderbaar
      - "127.0.0.1:7687:7687" # bolt
    volumes:
      - neo4jdata:/data
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: postgres://rbrules:rbrules@postgres:5432/rbrules
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-rbrules-neo4j}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Embeddings: lokaal via Ollama (default) of Voyage.
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-ollama}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      CARD_SOURCE: ${CARD_SOURCE:-auto}
      OUTBOUND_PROXY: ${OUTBOUND_PROXY:-}
      # AI (Fase 2) — via Claude-abonnement (OAuth) of API-key; zie docs/AI_AUTH.md
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000" # achter Caddy; lokaal direct op localhost:3000
    restart: unless-stopped

  # Reverse proxy met automatische Let's Encrypt-TLS. Alleen actief met
  # `--profile public` (Azure). Vereist DOMAIN in .env + open poorten 80/443.
  caddy:
    image: caddy:2
    profiles: ["public"]
    environment:
      DOMAIN: ${DOMAIN:?zet DOMAIN in .env voor het public-profiel}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - app
    restart: unless-stopped

  # Lokaal embedding-model (gratis). Trek het model eenmalig:
  #   docker compose exec ollama ollama pull nomic-embed-text
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
  caddydata:
  caddyconfig:
  ollamadata:
